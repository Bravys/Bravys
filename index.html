<!DOCTYPE html>
<html>
<head>
  <title>Tik-Tac-Toe Gate</title>
  <style>
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 5px;
      margin: 20px auto;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 2em;
      text-align: center;
      line-height: 100px;
      background: #eee;
      cursor: pointer;
    }
    #mathGate {
      display: none;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Win or Draw to Unlock the Math Gate</h2>
  <div id="board"></div>
  <div id="mathGate">
    <h3>✅ Math Gate Unlocked!</h3>
    <p>Solve: What is (7 × 8) + 12?</p>
    <!-- Add your math logic here -->
  </div>

  <script>
    const board = document.getElementById("board");
    const mathGate = document.getElementById("mathGate");
    let cells = Array(9).fill("");
    let player = "X";
    let gameOver = false;

    function checkWin(c) {
      const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      return wins.some(line => line.every(i => cells[i] === c));
    }

    function checkDraw() {
      return cells.every(c => c !== "");
    }

    function aiMove() {
      let empty = cells.map((c, i) => c === "" ? i : null).filter(i => i !== null);
      if (empty.length === 0) return;
      let move = empty[Math.floor(Math.random() * empty.length)];
      cells[move] = "O";
      board.children[move].textContent = "O";
    }

    function handleClick(i) {
      if (cells[i] !== "" || gameOver) return;
      cells[i] = player;
      board.children[i].textContent = player;

      if (checkWin(player)) {
        gameOver = true;
        mathGate.style.display = "block";
      } else if (checkDraw()) {
        gameOver = true;
        mathGate.style.display = "block";
      } else {
        aiMove();
        if (checkWin("O")) {
          gameOver = true;
          alert("❌ You lost. Try again.");
        } else if (checkDraw()) {
          gameOver = true;
          mathGate.style.display = "block";
        }
      }
    }

    for (let i = 0; i < 9; i++) {
      let cell = document.createElement("div");
      cell.className = "cell";
      cell.addEventListener("click", () => handleClick(i));
      board.appendChild(cell);
    }
  </script>
</body>
</html>
